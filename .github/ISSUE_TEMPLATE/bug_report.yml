name: Bug report
description: Report a defect in app behavior, automation flow, or release pipeline.
title: "[Bug]: "
labels: ["type:bug", "needs:triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: Pixel 8, Android 14
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or trace output
