name: Alpha Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create after checks (example: v0.3.4-alpha)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-alpha:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run release gate checks
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew lintDebug testDebugUnitTest assembleDebug

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret not found. Refusing to publish an update with a non-stable signing key."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "Keystore decoded successfully."

      - name: Build signed alpha artifacts
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleAlpha bundleAlpha

      - name: Create and push release tag
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists on origin."
            exit 1
          fi
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Upload alpha artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpha-artifacts
          path: |
            android/app/build/outputs/apk/alpha/*.apk
            android/app/build/outputs/bundle/alpha/*.aab
          retention-days: 30

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: |
            android/app/build/outputs/apk/alpha/*.apk
            android/app/build/outputs/bundle/alpha/*.aab
          generate_release_notes: true
