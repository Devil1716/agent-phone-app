name: Alpha Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-alpha:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "Keystore decoded successfully."
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not found. Proceeding with Gradle fallback signing."
          fi

      - name: Build signed alpha artifacts
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleAlpha bundleAlpha

      - name: Upload alpha artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpha-artifacts
          path: |
            android/app/build/outputs/apk/alpha/*.apk
            android/app/build/outputs/bundle/alpha/*.aab
          retention-days: 30

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/alpha/*.apk
            android/app/build/outputs/bundle/alpha/*.aab
          generate_release_notes: true
