name: Dependency Scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-review-support:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.detect.outputs.enabled }}
    steps:
      - name: Detect dependency review support
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          response="$(gh api repos/${{ github.repository }})"
          if echo "$response" | jq -e '.security_and_analysis.dependency_graph.status == "enabled"' > /dev/null; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  dependency-review:
    if: github.event_name == 'pull_request' && needs.dependency-review-support.outputs.enabled == 'true'
    needs: dependency-review-support
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  dependency-review-skipped:
    if: github.event_name == 'pull_request' && needs.dependency-review-support.outputs.enabled != 'true'
    needs: dependency-review-support
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped dependency review
        run: |
          echo "Dependency graph is not enabled for this repository."
          echo "Skipping dependency review until GitHub exposes dependency_graph support for the repo."

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build for analysis
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Analyze
        uses: github/codeql-action/analyze@v3
