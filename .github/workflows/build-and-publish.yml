name: Build & Publish APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Get version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "tag=build-${TIMESTAMP}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Build ${TIMESTAMP} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Rename APK with version
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          cp "$APK_PATH" "android/app/build/outputs/apk/debug/gemma-agent-phone-${{ steps.version.outputs.tag }}.apk"

      - name: Create GitHub Release with download link
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Gemma Agent Build ${{ steps.version.outputs.name }}"
          body: |
            ## Gemma Agent Phone - Latest Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Triggered by:** ${{ github.actor }}

            ### Install
            Download the APK below and install it on your Android device (Android 9+).

            ### What's included
            - Refreshed Material Design UI
            - Voice input support
            - Execution history with tap-to-rerun
            - Confirmation dialogs for risky actions
            - Notification summarization
            - Onboarding with permission setup
            - Local Gemma model download and import
            - Full agent runtime (goal interpretation -> task planning -> policy -> execution)

            ### How to update
            Every push to `main` creates a new release here. Bookmark this page or enable GitHub notifications to get the latest build automatically.
          files: |
            android/app/build/outputs/apk/debug/gemma-agent-phone-*.apk
          prerelease: true
          make_latest: true

      - name: Post download link to summary
        run: |
          echo "## APK Download" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A new release has been published with the latest APK." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Direct link:** [Latest Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install the \`.apk\` file on any Android 9+ device." >> $GITHUB_STEP_SUMMARY
