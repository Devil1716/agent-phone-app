name: Build & Publish APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret not found. Refusing to publish an update with a non-stable signing key."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "Keystore decoded successfully."

      - name: Get version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "tag=alpha-${TIMESTAMP}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Alpha ${TIMESTAMP} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Build signed alpha APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleAlpha -PversionName=${{ steps.version.outputs.tag }}

      - name: Rename APK with version
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/alpha -name "*.apk" | head -1)
          cp "$APK_PATH" "android/app/build/outputs/apk/alpha/gemma-agent-phone-${{ steps.version.outputs.tag }}.apk"

      - name: Create GitHub Release with download link
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Gemma Agent Build ${{ steps.version.outputs.name }}"
          body: |
            ## Gemma Agent Phone - Signed Alpha Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Triggered by:** ${{ github.actor }}

            ### Install
            Download the APK below and install it on your Android device (Android 9+).

            ### What's included
            - Refreshed Material Design UI
            - Voice input support
            - Execution history with tap-to-rerun
            - Confirmation dialogs for risky actions
            - Notification summarization
            - Onboarding with permission setup
            - Local Gemma model download and import
            - Full agent runtime (goal interpretation -> task planning -> policy -> execution)

            ### How to update
            Published GitHub updates use the same signed alpha package so Android can install them over the previous signed alpha build.
          files: |
            android/app/build/outputs/apk/alpha/gemma-agent-phone-*.apk
          prerelease: true
          make_latest: false

      - name: Post download link to summary
        run: |
          echo "## APK Download" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A new release has been published with the latest APK." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Direct link:** [Latest Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install the \`.apk\` file on any Android 9+ device." >> $GITHUB_STEP_SUMMARY
